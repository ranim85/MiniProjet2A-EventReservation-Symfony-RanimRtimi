security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username
        admin_provider:
            entity:
                class: App\Entity\Admin
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Endpoints publics API auth (pas de JWT requis)
        auth_api:
            pattern: ^/api/auth/(register|login)
            stateless: true
            security: false

        # API protégée par JWT
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: /api/token/refresh

        # Interface admin (form_login classique)
        admin:
            pattern: ^/admin
            provider: admin_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin_event_index
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login

        # Interface utilisateur (form_login classique)
        main:
            pattern: ^/
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_home
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login

    access_control:
        # Routes publiques API
        - { path: ^/api/auth,         roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
        # Routes protégées API (JWT requis)
        - { path: ^/api,              roles: ROLE_USER }
        # Routes admin
        - { path: ^/admin/login,      roles: PUBLIC_ACCESS }
        - { path: ^/admin,            roles: ROLE_ADMIN }
        # Routes utilisateur
        - { path: ^/login,            roles: PUBLIC_ACCESS }
        - { path: ^/register,         roles: PUBLIC_ACCESS }
        - { path: ^/passkey-login,    roles: PUBLIC_ACCESS }
        - { path: ^/,                 roles: ROLE_USER }